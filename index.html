<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap');
        body{
            background-color: aquamarine;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
      
        .vid{
            width: 500px;
            height: 600px;
            background-color: rgb(255, 255, 255);
            border-radius: 10%;
            border: 5px solid;
            text-align: center;
            box-shadow: 0 110px 220px rgba(red, green, blue, alpha);
        }
        img{
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid black;
            margin-bottom: 15px;
        }
        h1{
            color: rgb(24, 7, 139);
            font-size: 50px;
            font-family: "Shadows Into Light", cursive;
  font-weight: 400;
  font-style: normal;
        }
        p{
            color: rgb(42, 153, 153);
            font-size: 50px ;
        }
        .ert{
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .ert a{
            text-decoration: none;
            color: brown;
            font-weight: bold;
            border: 1px solid darkorange;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        .ert a:hover{
            background-color: rgb(204, 0, 255);
        }
    </style>
</head>
<body>
    <div class="vid">
        <img src="./обои.png" alt="">
        <h1>ADIS</h1>
        <p>I am adis</p>
        <a href="https://www.youtube.com/">vidio</a>
        
        <a href="https://www.instagram.com/">instagram</a>

        <a href="https://x.com/?lang=ru">twitter</a>
         <div class="ert"></div>
    <div>
</body>
</html>
